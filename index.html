<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Matrículas PUCPR</title>
    <!-- Vinculando o CSS separado -->
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body>

    <h2>Portal de Matrículas</h2>
    
    <div class="container">
        <!-- Menu de Navegação das Abas -->
        <div class="tabs">
            <button class="tab-btn active" id="btn-realizar">Realizar Matrícula</button>
            <button class="tab-btn" id="btn-consultar">Consultar Matrícula</button>
        </div>

        <!-- CONTEÚDO DA ABA 1: REALIZAR MATRÍCULA -->
        <div id="realizar" class="tab-content active">
            <form id="formMatricula">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome completo">
                </div>
                <div class="form-group">
                    <label for="curso">Curso Desejado</label>
                    <select id="curso" required>
                        <option value="">Selecione um curso</option>
                        <option value="Engenharia de Software">Engenharia de Software</option>
                        <option value="Análise de Sistemas">Análise de Sistemas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="comprovante">Comprovante de Pagamento (ID da Transação / PIX)</label>
                    <input type="text" id="comprovante" required placeholder="Ex: TX123456789">
                </div>
                <div class="form-group">
                    <label for="documento">Documento de Identidade (PDF ou Imagem)</label>
                    <input type="file" id="documento" required>
                </div>
                <button type="submit" class="btn-primary">Enviar Matrícula</button>
            </form>
            <div id="msgRealizar" class="notification success" style="display:none;"></div>
        </div>

        <!-- CONTEÚDO DA ABA 2: CONSULTAR MATRÍCULA -->
        <div id="consultar" class="tab-content">
            <div class="form-group">
                <label>Mural de Notificações - Matrículas Concluídas:</label>
            </div>
    
    <!-- Container onde o JS vai renderizar todas as notificações automaticamente -->
        <div id="listaNotificacoes">
            <div class="notification info">Carregando notificações dos servidores...</div>
        </div>
        </div>

    <!-- Vinculando o JavaScript separado -->
    <script src="public/js/app.js"></script>
</body>
</html>
